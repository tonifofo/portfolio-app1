name: my fist pipeline

on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: build image
              run:  |
               docker build -t ${{ secrets.DOCKER_USERNAME }}/ciportofolio:${{ github.run_number }} .
               docker build -t ${{ secrets.DOCKER_USERNAME }}/ciportofolio .
            - name: Docker login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: push image to registry
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/ciportofolio
                docker push ${{ secrets.DOCKER_USERNAME }}/ciportofolio:${{ github.run_number }}
                    
    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: SSH to Linux and run container
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.SSH_USERNAME }}
                key: ${{ secrets.PRIVATE_KEY }}
                script: |
                    docker rm -f portofolio|| echo "Container not found, skipping removal"
                    docker rmi -f ${{ secrets.DOCKER_USERNAME }}/ciportofolio || echo "Image do not exit"
                    docker run -d --name portofolio -p 8080:80 ${{ secrets.DOCKER_USERNAME }}/ciportofolio    
