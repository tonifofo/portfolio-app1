name: Build, Scan, and Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}
  ECS_CONTAINER_NAME: ${{ secrets.ECS_CONTAINER_NAME }}

jobs:
  # =========================================================
  # JOB 1: BUILD AND PUSH IMAGE TO AMAZON ECR
  # =========================================================
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "ECR registry: ${ECR_REGISTRY}"
          echo "ECR repository: ${ECR_REPOSITORY}"
          echo "Image URI: ${IMAGE_URI}"

          docker build \
            --tag "${IMAGE_URI}" \
            --tag "${LATEST_IMAGE}" \
            .

          docker push "${IMAGE_URI}"
          docker push "${LATEST_IMAGE}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Confirm image push
        run: |
          echo "Image successfully pushed:"
          echo "${{ steps.build-image.outputs.image_uri }}"

  # =========================================================
  # JOB 2: SCAN IMAGE WITH TRIVY
  # DEPLOYMENT WILL NOT RUN IF THIS JOB FAILS
  # =========================================================
  scan:
    name: Scan Image with Trivy
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-push.outputs.image_uri }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Confirm scan passed
        run: |
          echo "Security scan passed."
          echo "Approved image:"
          echo "${{ needs.build-push.outputs.image_uri }}"

  # =========================================================
  # JOB 3: UPDATE TASK DEFINITION AND DEPLOY TO ECS
  # THIS JOB RUNS ONLY AFTER THE SCAN PASSES
  # =========================================================
  deploy-ecs:
    name: Deploy to Amazon ECS
    needs:
      - build-push
      - scan
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Display deployment information
        run: |
          echo "AWS region: ${AWS_REGION}"
          echo "ECS cluster: ${ECS_CLUSTER}"
          echo "ECS service: ${ECS_SERVICE}"
          echo "Task definition: ${ECS_TASK_DEFINITION}"
          echo "Container name: ${ECS_CONTAINER_NAME}"
          echo "Image: ${{ needs.build-push.outputs.image_uri }}"

      - name: Download current ECS task definition
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query "taskDefinition" \
            --output json \
            > task-definition.json

          echo "Task definition downloaded successfully."

      - name: Update image in task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ needs.build-push.outputs.image_uri }}

      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Confirm deployment
        run: |
          echo "ECS deployment completed successfully."
          echo "Deployed image:"
          echo "${{ needs.build-push.outputs.image_uri }}"