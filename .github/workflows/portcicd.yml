name: Build, Scan, and Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}
  ECS_CONTAINER_NAME: ${{ secrets.ECS_CONTAINER_NAME }}

jobs:
  # =========================================================
  # JOB 1: BUILD AND PUSH THE IMAGE TO AMAZON ECR
  # =========================================================
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION}" ]; then
            echo "ERROR: AWS_REGION secret is empty."
            exit 1
          fi

          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "ERROR: ECR_REPOSITORY secret is empty."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${ECR_REGISTRY}" ]; then
            echo "ERROR: ECR registry output is empty."
            exit 1
          fi

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building image:"
          echo "${IMAGE_URI}"

          docker build \
            --tag "${IMAGE_URI}" \
            --tag "${LATEST_IMAGE}" \
            .

          echo "Pushing commit image:"
          docker push "${IMAGE_URI}"

          echo "Pushing latest image:"
          docker push "${LATEST_IMAGE}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Verify build output
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_URI}" ]; then
            echo "ERROR: Build image output is empty."
            exit 1
          fi

          echo "Image successfully built and pushed:"
          echo "${IMAGE_URI}"

  # =========================================================
  # JOB 2: SCAN THE EXACT IMAGE WITH TRIVY
  # DEPLOYMENT STOPS IF HIGH OR CRITICAL ISSUES ARE FOUND
  # =========================================================
  scan:
    name: Scan Image with Trivy
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image received from build job
        env:
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_URI}" ]; then
            echo "ERROR: No image URI was received from the build job."
            exit 1
          fi

          echo "Image received for scanning:"
          echo "${IMAGE_URI}"

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-push.outputs.image_uri }}
          scan-type: image
          format: table
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Confirm security scan passed
        env:
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          echo "Trivy security scan passed."
          echo "Approved image:"
          echo "${IMAGE_URI}"

  # =========================================================
  # JOB 3: UPDATE THE ECS TASK DEFINITION AND DEPLOY
  # RUNS ONLY AFTER THE SECURITY SCAN PASSES
  # =========================================================
  deploy-ecs:
    name: Deploy to Amazon ECS
    needs:
      - build-push
      - scan
    runs-on: ubuntu-latest

    steps:
      - name: Validate ECS variables
        env:
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          set -euo pipefail

          if [ -z "${ECS_CLUSTER}" ]; then
            echo "ERROR: ECS_CLUSTER secret is empty."
            exit 1
          fi

          if [ -z "${ECS_SERVICE}" ]; then
            echo "ERROR: ECS_SERVICE secret is empty."
            exit 1
          fi

          if [ -z "${ECS_TASK_DEFINITION}" ]; then
            echo "ERROR: ECS_TASK_DEFINITION secret is empty."
            exit 1
          fi

          if [ -z "${ECS_CONTAINER_NAME}" ]; then
            echo "ERROR: ECS_CONTAINER_NAME secret is empty."
            exit 1
          fi

          if [ -z "${IMAGE_URI}" ]; then
            echo "ERROR: IMAGE_URI is empty."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Display deployment information
        env:
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          echo "AWS region: ${AWS_REGION}"
          echo "ECS cluster: ${ECS_CLUSTER}"
          echo "ECS service: ${ECS_SERVICE}"
          echo "Task definition: ${ECS_TASK_DEFINITION}"
          echo "Container name: ${ECS_CONTAINER_NAME}"
          echo "Image: ${IMAGE_URI}"

      - name: Download current ECS task definition
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query "taskDefinition" \
            --output json \
            > task-definition.json

          echo "Current ECS task definition downloaded."

      - name: Insert image into ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ needs.build-push.outputs.image_uri }}

      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Confirm deployment
        env:
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          echo "ECS deployment completed successfully."
          echo "Deployed image:"
          echo "${IMAGE_URI}"